##############################################################
# Nginx configuration for SocialNet
# Place this file at: /etc/nginx/sites-available/socialnet
# Then: sudo ln -s /etc/nginx/sites-available/socialnet \
#                   /etc/nginx/sites-enabled/socialnet
# And:  sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    server_name localhost;   # Change to your actual domain / IP if needed

    # Root for the entire project
    root /var/www/socialnet_project;
    index index.php index.html;

    charset utf-8;

    # ── /admin/* ─────────────────────────────────────────────
    location /admin/ {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include        snippets/fastcgi-php.conf;
            fastcgi_pass   unix:/run/php/php8.3-fpm.sock;  # adjust PHP version if needed
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ── /socialnet/* ──────────────────────────────────────────
    location /socialnet/ {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include        snippets/fastcgi-php.conf;
            fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # Deny direct access to /config/
    location /config/ {
        deny all;
        return 403;
    }

    # Generic PHP handler (fallback)
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Security – hide dotfiles
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/socialnet_access.log;
    error_log  /var/log/nginx/socialnet_error.log;
}
